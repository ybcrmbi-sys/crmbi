<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>호텔 정보 검색 - 최종 안정화 버전</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
  <style>
    /* UI 스타일 설정 */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --crimson: #C8102E; --crimson-dark: #a00d24; --crimson-light: #fdf1f3;
      --navy: #1a2340; --navy-mid: #2c3e6b; --gold: #b8922a;
      --warm-gray: #f7f5f3; --border: #e8e3de; --text-main: #1e1e1e;
      --text-sub: #5a5a5a; --text-light: #999; --white: #ffffff;
      --shadow: 0 2px 16px rgba(0,0,0,0.08);
    }
    body { font-family: 'Noto Sans KR', sans-serif; background: var(--warm-gray); color: var(--text-main); min-height: 100vh; display: flex; flex-direction: column; }
    header { background: var(--navy); padding: 0 32px; height: 60px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 12px rgba(0,0,0,0.3); }
    .logo { display: flex; align-items: center; gap: 10px; color: white; }
    .logo-icon { width: 32px; height: 32px; background: var(--crimson); border-radius: 6px; display: flex; align-items: center; justify-content: center; }
    .logo-text { font-family: 'Playfair Display', serif; font-size: 18px; letter-spacing: 0.5px; }
    .app-body { flex: 1; display: flex; overflow: hidden; height: calc(100vh - 60px); }
    .left-panel { width: 380px; min-width: 320px; background: var(--white); display: flex; flex-direction: column; border-right: 1px solid var(--border); overflow: hidden; }
    .search-area { padding: 20px; border-bottom: 1px solid var(--border); }
    .filter-group { margin-bottom: 12px; }
    .filter-label { font-size: 11px; font-weight: 600; color: var(--text-light); margin-bottom: 6px; display: block; text-transform: uppercase; }
    select, input[type="text"] { width: 100%; padding: 10px 14px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 13px; outline: none; transition: border-color 0.2s; }
    select:focus, input[type="text"]:focus { border-color: var(--crimson); }
    .search-btn { width: 100%; margin-top: 10px; padding: 12px; background: var(--crimson); color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
    .search-btn:hover { background: var(--crimson-dark); }
    .search-btn:disabled { background: #ccc; cursor: not-allowed; }
    .results-header { padding: 12px 20px; border-bottom: 1px solid var(--border); background: var(--warm-gray); font-size: 12px; }
    .hotel-list { flex: 1; overflow-y: auto; }
    .hotel-item { padding: 14px 20px; border-bottom: 1px solid var(--border); cursor: pointer; display: flex; gap: 12px; transition: background 0.15s; }
    .hotel-item:hover { background: var(--crimson-light); }
    .hotel-item.active { background: var(--crimson-light); border-left: 3px solid var(--crimson); }
    .hotel-thumb { width: 56px; height: 46px; border-radius: 6px; object-fit: cover; background: #eee; flex-shrink: 0; }
    .hotel-item-info { flex: 1; min-width: 0; }
    .hotel-item-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .right-panel { flex: 1; overflow-y: auto; background: var(--warm-gray); padding: 28px; }
    .spinner { width: 24px; height: 24px; border: 3px solid #f3f3f3; border-top: 3px solid var(--crimson); border-radius: 50%; animation: spin 1s linear infinite; margin: 20px auto; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    #toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--navy); color: white; padding: 10px 20px; border-radius: 8px; font-size: 13px; opacity: 0; transition: all 0.3s; z-index: 999; pointer-events: none; }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon"><svg viewBox="0 0 24 24" width="18" height="18" fill="white"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg></div>
    <div class="logo-text">HotelSearch</div>
  </div>
  <div style="font-size: 12px; color: rgba(255,255,255,0.6);">Powered by DuckDB WASM</div>
</header>

<div class="app-body">
  <div class="left-panel">
    <div class="search-area">
      <div class="filter-group">
        <label class="filter-label">국가 선택</label>
        <select id="countrySelect"><option value="">-- 국가를 선택하세요 --</option></select>
      </div>
      <div class="filter-group">
        <label class="filter-label">호텔명 검색</label>
        <input type="text" id="hotelSearch" placeholder="호텔명을 입력하세요" />
      </div>
      <button class="search-btn" id="searchBtn" onclick="doSearch()">검색</button>
    </div>
    <div class="results-header" id="resultCount">국가를 선택하고 검색하세요</div>
    <div class="hotel-list" id="hotelList"></div>
  </div>
  <div class="right-panel" id="rightPanel">
    <div style="text-align:center; color:#999; margin-top:100px;">호텔을 선택하면 상세 정보가 표시됩니다.</div>
  </div>
</div>

<div id="toast"></div>

<script type="module">
  import * as duckdb from 'https://cdn.jsdelivr.net/npm/@duckdb/duckdb-wasm@1.29.0/+esm';

  let db = null;
  let conn = null;
  let allHotels = [];

  // DuckDB 초기화
  async function initDuckDB() {
    try {
      const JSDELIVR_BUNDLES = duckdb.getJsDelivrBundles();
      const bundle = await duckdb.selectBundle(JSDELIVR_BUNDLES);
      const worker_url = URL.createObjectURL(new Blob([`importScripts("${bundle.mainWorker}");`], {type: 'text/javascript'}));
      const worker = new Worker(worker_url);
      db = new duckdb.AsyncDuckDB(new duckdb.ConsoleLogger(), worker);
      await db.instantiate(bundle.mainModule, bundle.pthreadWorker);
      conn = await db.connect();
      console.log("DuckDB Initialized");
    } catch (e) {
      console.error(e);
      showToast("DB 초기화 실패");
    }
  }

  // 국가 목록 데이터
  const COUNTRIES = [
    {code:'AD', name:'안도라'}, {code:'KR', name:'한국'}, {code:'JP', name:'일본'}, 
    {code:'US', name:'미국'}, {code:'VN', name:'베트남'}, {code:'FR', name:'프랑스'}
  ];

  function populateCountries() {
    const sel = document.getElementById('countrySelect');
    COUNTRIES.sort((a,b) => a.name.localeCompare(b.name, 'ko')).forEach(c => {
      const opt = document.createElement('option');
      opt.value = c.code; opt.textContent = `${c.name} (${c.code})`;
      sel.appendChild(opt);
    });
  }

  // 검색 메인 함수
  window.doSearch = async function() {
    const countryCode = document.getElementById('countrySelect').value;
    const keyword = document.getElementById('hotelSearch').value.trim();
    if (!countryCode) { showToast("국가를 선택해주세요"); return; }

    const btn = document.getElementById('searchBtn');
    btn.disabled = true; btn.textContent = "조회 중...";
    document.getElementById('hotelList').innerHTML = '<div class="spinner"></div>';

    try {
      const baseUrl = window.location.origin + window.location.pathname.replace(/\/[^/]*$/, '/');
      const folder = `${baseUrl}parquet1/COUNTRY_CODE=${countryCode}/`;

      // 이미지에서 확인된 모든 파일명 패턴 정의
      const filePatterns = [
        // 이미지 2번: 해시값 형태
        "5de50a6f39304c41b16b2859103483fe-0.parquet", 
        "27e3c72f368046d0a51a1079928f206a-0.parquet",
        // 이미지 3번: partXXX 형태
        ...Array.from({ length: 15 }, (_, i) => `part${String(i + 1).padStart(3, '0')}.parquet`),
        // 사용자 요청: part-00000 (1) 형태
        ...Array.from({ length: 5 }, (_, i) => `part-${String(i).padStart(5, '0')} (1).parquet`),
        // 표준: part-00000 형태
        ...Array.from({ length: 20 }, (_, i) => `part-${String(i).padStart(5, '0')}.parquet`)
      ];

      // 존재하는 파일만 필터링
      const checks = await Promise.all(
        filePatterns.map(name => {
          const url = folder + name;
          return fetch(url, { method: 'HEAD' }).then(r => r.ok ? url : null).catch(() => null);
        })
      );

      const validUrls = checks.filter(Boolean);

      if (validUrls.length === 0) {
        showToast("데이터 파일을 찾을 수 없습니다. (404/CORS 확인)");
        document.getElementById('hotelList').innerHTML = '';
        return;
      }

      const dataSource = `['${validUrls.join("','")}']`;
      const filterSql = keyword ? `WHERE (UPPER(HOTEL_NAME_KO) LIKE '%${keyword.toUpperCase()}%' OR UPPER(HOTEL_NAME_EN) LIKE '%${keyword.toUpperCase()}%')` : '';

      const sql = `
        SELECT * FROM read_parquet(${dataSource})
        ${filterSql}
        ORDER BY ALL_AVERAGE DESC NULLS LAST
        LIMIT 100
      `;

      const result = await conn.query(sql);
      allHotels = result.toArray().map(r => Object.fromEntries(Object.entries(r)));
      renderList(allHotels);

    } catch (e) {
      console.error(e);
      showToast("검색 중 오류 발생: " + e.message);
    } finally {
      btn.disabled = false; btn.textContent = "검색";
    }
  };

  function renderList(hotels) {
    const list = document.getElementById('hotelList');
    document.getElementById('resultCount').innerHTML = `총 <b>${hotels.length}</b>개의 호텔 검색됨`;
    list.innerHTML = hotels.map((h, i) => `
      <div class="hotel-item" onclick="selectHotel(${i})" id="hi-${i}">
        <img class="hotel-thumb" src="${(h.DEFAULT_PHOTO_URL && h.DEFAULT_PHOTO_URL !== 'None') ? h.DEFAULT_PHOTO_URL : 'https://via.placeholder.com/56x46?text=No+Img'}" onerror="this.src='https://via.placeholder.com/56x46?text=Err'">
        <div class="hotel-item-info">
          <div class="hotel-item-name">${h.HOTEL_NAME_KO || h.HOTEL_NAME_EN}</div>
          <div style="font-size:11px; color:#999;">${h.STAR_RATING || '-'}성급 | 평점: ${h.ALL_AVERAGE ? parseFloat(h.ALL_AVERAGE).toFixed(1) : '-'}</div>
        </div>
      </div>
    `).join('');
  }

  window.selectHotel = function(idx) {
    document.querySelectorAll('.hotel-item').forEach(el => el.classList.remove('active'));
    document.getElementById('hi-' + idx).classList.add('active');
    
    const h = allHotels[idx];
    document.getElementById('rightPanel').innerHTML = `
      <div style="background:white; padding:24px; border-radius:12px; box-shadow:var(--shadow);">
        <h2 style="font-size:22px; margin-bottom:4px;">${h.HOTEL_NAME_KO || '-'}</h2>
        <p style="color:#888; margin-bottom:20px;">${h.HOTEL_NAME_EN || ''}</p>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; font-size:13px; margin-bottom:20px;">
          <div style="color:#666;"><b>주소:</b> ${h.ADDRESS_KO || '-'}</div>
          <div style="color:#666;"><b>연락처:</b> ${h.PHONE_NO || '-'}</div>
          <div style="color:#666;"><b>체크인:</b> ${h.CHECK_IN_TIME || '-'}</div>
          <div style="color:#666;"><b>체크아웃:</b> ${h.CHECK_OUT_TIME || '-'}</div>
        </div>
        <div style="border-top:1px solid #eee; padding-top:20px;">
          <h4 style="margin-bottom:10px; color:var(--crimson);">호텔 소개</h4>
          <p style="font-size:13px; line-height:1.6; color:#555;">${(h.HOTEL_INTRO_KO && h.HOTEL_INTRO_KO !== 'None') ? h.HOTEL_INTRO_KO.replace(/<[^>]+>/g, '') : '정보 없음'}</p>
        </div>
      </div>
    `;
  };

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  (async () => {
    populateCountries();
    await initDuckDB();
  })();
</script>
</body>
</html>
